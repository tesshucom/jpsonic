# Java LTS (21) is validated on Windows and Linux
# Coverage is generated on Linux and sent to Codacy
name: CI
on:
  push:
  pull_request:
    types:
      - opened
      - edited
  schedule:
    - cron: '16 11 * * 1'

env:
  ## LANG: "C" 
  ## LC_CTYPE: "en_US.UTF-8"
  LC_ALL: "C.UTF-8"
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

jobs:
  ##########################################################################
  pre_job:
    name: Duplicate actions check
    # continue-on-error: true # Uncomment once integration is finished
    runs-on: ubuntu-latest
    # Map a step output to a job output
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@v5
        with:
          # All of these options are optional, so you can remove them if you are happy with the defaults
          concurrent_skipping: 'never'
          skip_after_successful_duplicate: 'true'
          paths_ignore: '["**/README.md", "**/CHANGELOG.md"]'
          do_not_skip: '["pull_request", "workflow_dispatch", "schedule"]'
  ##########################################################################
  analyze:
    needs: pre_job
    if: ${{ needs.pre_job.outputs.should_skip != 'true' && github.event_name == 'pull_request' }}
    name: Analyze with CodeQL
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [ 'java', 'javascript' ]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        queries: security-and-quality
    - name: Set up java
      if: contains(matrix.language, 'java')
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: 21
    - name: Prepare Maven m2-Cache And Settings
      uses:
        ./.github/actions/maven-prepare
      with:
        gh_user: ${{ github.actor }}
        gh_pat: ${{ secrets.JPSONIC_PACKAGE_TOKEN }}
    - name: Compile with Maven
      run: mvn clean compile -Dmaven.test.skip=true -Dpmd.skip=true -Pjetty-embed -Prelease21
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
  ##########################################################################
  verify-Java21:
    needs: pre_job
    if: ${{ needs.pre_job.outputs.should_skip != 'true' }}
    name: JDK21 on ${{ matrix.os }}
    strategy:
      matrix:
        os: [ windows-latest, ubuntu-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21
      - name: Set up ffmpeg
        id: ffmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Get current date
        id: cve-date
        shell: bash
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
      - name: Prepare Maven m2-Cache And Settings
        uses:
          ./.github/actions/maven-prepare
        with:
          gh_user: ${{ github.actor }}
          gh_pat: ${{ secrets.JPSONIC_PACKAGE_TOKEN }}
      - name: Cache Dependency-Check NVD Data
        uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository/org/owasp/dependency-check-data
            C:\Users\runneradmin\.m2\repository\org/owasp/dependency-check-data
          key: ${{ runner.os }}-dependency-check-12-21-${{ steps.cve-date.outputs.date }}
          restore-keys: ${{ runner.os }}-dependency-check-12-21-
      - name: Create coverage
        id: create-coverage
        if: contains(matrix.os, 'ubuntu-latest')
        run: mvn -Punit-test -Psend-coverage -Ptomcat-embed -DfailIfNoTests=false -Djpsonic-transcodePath="${{ steps.ffmpeg.outputs.ffmpeg-path }}" -Prelease21 clean test jacoco:report
      - name: Archive code coverage
        if: "(steps.create-coverage.conclusion == 'success' && contains(matrix.os, 'ubuntu-latest')) && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')"
        uses: actions/upload-artifact@v7
        with:
          name: Code coverage report
          path: jpsonic-main/target/site/jacoco
          retention-days: 7
      - name: Verify with Maven on Win
        if: contains(matrix.os, 'windows-latest')
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: mvn -DnvdApiKey=${{ env.NVD_API_KEY }} -DnvdApiDelay=3000 -DnvdMaxRetryCount=10 -DfailIfNoTests=false -Djpsonic-transcodePath="${{ steps.ffmpeg.outputs.ffmpeg-path }}" -Prelease21 clean verify -B -Ptomcat-embed -Punit-test
  ##########################################################################
  verify-Java26:
    needs: pre_job
    if: ${{ needs.pre_job.outputs.should_skip != 'true' }}
    name: JDK${{ matrix.java }} on ubuntu-latest
    strategy:
      matrix:
        java: [ 26 ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
      - name: Set up ffmpeg
        id: ffmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Get current date
        id: cve-date
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
      - name: Prepare Maven m2-Cache And Settings
        uses:
          ./.github/actions/maven-prepare
        with:
          gh_user: ${{ github.actor }}
          gh_pat: ${{ secrets.JPSONIC_PACKAGE_TOKEN }}
      - name: Cache Dependency-Check NVD Data
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: ${{ runner.os }}-dependency-check-12-${{ matrix.java }}-${{ steps.cve-date.outputs.date }}
          restore-keys: ${{ runner.os }}-dependency-check-12-${{ matrix.java }}-
      - name: Verify with Maven
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: mvn -DnvdApiKey=$NVD_API_KEY -DnvdApiDelay=3000 -DnvdMaxRetryCount=10 -Djpsonic-transcodePath="${{ steps.ffmpeg.outputs.ffmpeg-path }}" clean verify -B -Ptomcat-embed -Prelease${{ matrix.java }} -Punit-test
  ##########################################################################
  send-coverage:
    name: Send coverage to Codacy
    needs: [ verify-Java21 ]
    if: "(github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')"
    env:
      CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
      GITHUB_SHA: ${{ github.sha }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 11
      - name: Prepare Maven m2-Cache And Settings
        uses:
          ./.github/actions/maven-prepare
        with:
          gh_user: ${{ github.actor }}
          gh_pat: ${{ secrets.JPSONIC_PACKAGE_TOKEN }}
      - name: Download coverage
        uses: actions/download-artifact@v8
        with:
          name: Code coverage report
      - name: Send Jacoco report
        run: mvn -Psend-coverage com.gavinmogan:codacy-maven-plugin:coverage
  ##########################################################################
  ship-war:
    if: "(github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/feature/docker') && github.event_name != 'schedule'"
    needs: [ verify-Java21, verify-Java26 ]
    name: Package with JDK ${{ matrix.java }} on ubuntu
    strategy:
      matrix:
        java: [ 21, 24, 25, 26 ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
      - name: Get current date
        id: cve-date
        run: echo "current=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
      - name: Prepare Maven m2-Cache And Settings
        uses:
          ./.github/actions/maven-prepare
        with:
          gh_user: ${{ github.actor }}
          gh_pat: ${{ secrets.JPSONIC_PACKAGE_TOKEN }}
      - name: Cache Dependency-Check NVD Data
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: ${{ runner.os }}-dependency-check-12-${{ matrix.java }}-${{ steps.date.outputs.current }}
          restore-keys: ${{ runner.os }}-dependency-check-12-
      - name: Configure GPG Key
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
        run: |
          mkdir -p ~/.gnupg/
          chmod 700 ~/.gnupg
          printf "$GPG_SIGNING_KEY" | base64 --decode > ~/.gnupg/private.key
          chmod 600 ~/.gnupg/*
          gpg --quiet --import ~/.gnupg/private.key
      - name: Create jetty.war
        run: |
          mvn clean package -Dmaven.test.skip=true -Dpmd.skip=true -Pjetty-embed -Prelease${{ matrix.java }}
          cp jpsonic-main/target/jpsonic.war jpsonic-main/target/jpsonic-java${{ matrix.java }}.war
          sha256sum jpsonic-main/target/jpsonic-java${{ matrix.java }}.war | sed 's|jpsonic-main/target/||' > jpsonic-main/target/jpsonic-java${{ matrix.java }}.sha
          gpg2 --clearsign jpsonic-main/target/jpsonic-java${{ matrix.java }}.sha
      - name: Copy README
        run: cp install/keys/README.txt jpsonic-main/target
      - name: Get current date
        id: date
        run: echo "current=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
      - name: Archive artifact
        uses: actions/upload-artifact@v7
        with:
          name: jpsonic-jetty-embedded-for-jdk${{ matrix.java }}-${{ steps.date.outputs.current }}
          path: |
            jpsonic-main/target/jpsonic.war
            jpsonic-main/target/jpsonic-java${{ matrix.java }}.war
            jpsonic-main/target/jpsonic-java${{ matrix.java }}.sha.asc
            jpsonic-main/target/README.txt
          retention-days: 90
  ##########################################################################
  ship-war-to-release-page:
    name: Promote Artifacts to Release
    needs: [ship-war]
    if: github.ref == 'refs/heads/main' && github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Get current date
        id: date
        run: echo "current=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: jpsonic-jetty-embedded-for-jdk*-${{ steps.date.outputs.current }}
          path: all-assets
      - name: Set up Java to evaluate Maven version
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21
      - name: Prepare Maven m2-Cache And Settings
        uses:
          ./.github/actions/maven-prepare
        with:
          gh_user: ${{ github.actor }}
          gh_pat: ${{ secrets.JPSONIC_PACKAGE_TOKEN }}
      - name: Get Maven version and fix patch version to zero
        id: get_version
        run: |
          # Extract the precise project version from pom.xml
          FULL_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          # Force the 3rd digits (patch version) to '0' to align with Jpsonic's release policy (e.g., 114.2.x -> 114.2.0)
          # This regex preserves pre-release labels like -alpha.1 or -beta.2 if they exist
          FIXED_VERSION=$(echo $FULL_VERSION | sed -E 's/^([0-9]+\.[0-9]+)\.[0-9]+(.*)/\1.0\2/')
          # Append 'v' prefix to match standard git tag formatting (e.g., v114.2.0)
          echo "VERSION=v${FIXED_VERSION}" >> $GITHUB_OUTPUT
      - name: Organize, Rename and Fix Signatures
        run: |
          mkdir -p upload
          for jdk in 21 24 25 26; do
            SRC_DIR=$(find all-assets -name "*jdk${jdk}-*" -type d | head -n 1)
            if [ -n "$SRC_DIR" ]; then
              echo "Collecting JDK $jdk assets from $SRC_DIR..."
              cp "$SRC_DIR/jpsonic-java${jdk}.war" "upload/"
              cp "$SRC_DIR/jpsonic-java${jdk}.sha.asc" "upload/"
            fi
          done
          find all-assets -name "README.txt" | head -n 1 | xargs -I {} cp {} upload/
      - name: Push to Release Page
        uses: softprops/action-gh-release@v3
        with:
          repository: jpsonic/jpsonic
          token: ${{ secrets.RELEASE_TO_JPSONIC_TOKEN }}
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          files: upload/*
          overwrite: true
          generate_release_notes: false
          append_body: true
  ##########################################################################
  ship-docker-image:
    name: Docker(alpine-amd, arm)
    needs: ship-war
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}
      - name: Get current date
        id: date
        run: echo "current=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
      - name: Download package
        uses: actions/download-artifact@v8
        with:
          name: jpsonic-jetty-embedded-for-jdk26-${{ steps.date.outputs.current }}
      - name: Prepare Maven m2-Cache And Settings
        uses:
          ./.github/actions/maven-prepare
        with:
          gh_user: ${{ github.actor }}
          gh_pat: ${{ secrets.JPSONIC_PACKAGE_TOKEN }}
      - name: Create Tag
        run: |
          echo "DOCKER_TAG=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_ENV
      - name: Copy artifact
        run: |
          mkdir -p install/docker/alpine/target/dependency
          mv jpsonic.war install/docker/alpine/target/dependency
      - name: Release with Version Tag
        if: "(github.ref == 'refs/heads/main')"
        run: |
          if [[ ${{ env.DOCKER_TAG }} =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            cd install/docker/alpine
            sed -i -e "s/26-jdk-alpine/26-jre-alpine/g" Dockerfile
            sed -i -e "s/EXPOSE 3333/#EXPOSE 3333/g" Dockerfile
            mvn -DdockerTag=${{ env.DOCKER_TAG }} package
            docker import target/docker/jpsonic/jpsonic/tmp/docker-build.tar
            docker buildx build --push --platform linux/amd64,linux/arm64/v8 -t jpsonic/jpsonic:${{ env.DOCKER_TAG }} .
            mvn -DdockerTag=${DOCKER_TAG%.*} package
            docker import target/docker/jpsonic/jpsonic/tmp/docker-build.tar
            docker buildx build --push --platform linux/amd64,linux/arm64/v8 -t jpsonic/jpsonic:${DOCKER_TAG%.*} .
            mvn -DdockerTag=${DOCKER_TAG%.*.*} package
            docker import target/docker/jpsonic/jpsonic/tmp/docker-build.tar
            docker buildx build --push --platform linux/amd64,linux/arm64/v8 -t jpsonic/jpsonic:${DOCKER_TAG%.*.*} .
          fi
      - name: Release with Latest Tag
        if: github.ref == 'refs/heads/main'
        run: |
          if [[ ${{ env.DOCKER_TAG }} =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            cd install/docker/alpine
            sed -i -e "s/26-jdk-alpine/26-jre-alpine/g" Dockerfile
            sed -i -e "s/EXPOSE 3333/#EXPOSE 3333/g" Dockerfile
            mvn -DdockerTag=latest package
            docker import target/docker/jpsonic/jpsonic/tmp/docker-build.tar
            docker buildx build --push --platform linux/amd64,linux/arm64/v8 -t jpsonic/jpsonic:latest .
          fi
      - name: Release with Alpha/Beta Tag
        if: github.ref == 'refs/heads/main'
        run: |
          if [[ ${{ env.DOCKER_TAG }} =~ ^[0-9]+\.[0-9]+\.[0-9]+\.(alpha|beta)\.[0-9]+\.[0-9]+$ ]]; then
            cd install/docker/alpine
            sed -i -e "s/26-jdk-alpine/26-jre-alpine/g" Dockerfile
            sed -i -e "s/EXPOSE 3333/#EXPOSE 3333/g" Dockerfile
            mvn -DdockerTag=latest package
            docker import target/docker/jpsonic/jpsonic/tmp/docker-build.tar
            docker buildx build --push --platform linux/amd64,linux/arm64/v8 -t jpsonic/jpsonic:${{ env.DOCKER_TAG }} .
          fi
      - name: Release with Early-Access Tag
        if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/feature/docker'
        run: |
          cd install/docker/alpine
          mvn -DdockerTag=ea package
          docker import target/docker/jpsonic/jpsonic/tmp/docker-build.tar
          docker buildx build --push --platform linux/amd64,linux/arm64/v8 -t jpsonic/jpsonic:ea .
  ##########################################################################
  ship-docker-image-ubi9:
    name: Docker(ubi9-amd)
    needs: ship-war
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}
      - name: Get current date
        id: date
        run: echo "current=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
      - name: Download package
        uses: actions/download-artifact@v8
        with:
          name: jpsonic-jetty-embedded-for-jdk24-${{ steps.date.outputs.current }}
      - name: Prepare Maven m2-Cache And Settings
        uses:
          ./.github/actions/maven-prepare
        with:
          gh_user: ${{ github.actor }}
          gh_pat: ${{ secrets.JPSONIC_PACKAGE_TOKEN }}
      - name: Create Tag
        run: |
          echo "DOCKER_TAG=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_ENV
      - name: Copy artifact
        run: |
          mkdir -p install/docker/ubi9/target/dependency
          mv jpsonic.war install/docker/ubi9/target/dependency
      - name: Release with Version Tag
        if: "(github.ref == 'refs/heads/main')"
        run: |
          if [[ ${{ env.DOCKER_TAG }} =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            cd install/docker/ubi9
            sed -i -e "s/24-jdk-ubi9-minimal/24-jre-ubi9-minimal/g" Dockerfile
            sed -i -e "s/EXPOSE 3333/#EXPOSE 3333/g" Dockerfile
            mvn -DdockerTag=${{ env.DOCKER_TAG }}-ubi9 package
            docker import target/docker/jpsonic/jpsonic/tmp/docker-build.tar
            docker buildx build --push --platform linux/amd64 -t jpsonic/jpsonic:${{ env.DOCKER_TAG }}-ubi9 .
            mvn -DdockerTag=${DOCKER_TAG%.*}-ubi9 package
            docker import target/docker/jpsonic/jpsonic/tmp/docker-build.tar
            docker buildx build --push --platform linux/amd64 -t jpsonic/jpsonic:${DOCKER_TAG%.*}-ubi9 .
            mvn -DdockerTag=${DOCKER_TAG%.*.*}-ubi9 package
            docker import target/docker/jpsonic/jpsonic/tmp/docker-build.tar
            docker buildx build --push --platform linux/amd64 -t jpsonic/jpsonic:${DOCKER_TAG%.*.*}-ubi9 .
          fi
      - name: Release with Latest Tag
        if: github.ref == 'refs/heads/main'
        run: |
          if [[ ${{ env.DOCKER_TAG }} =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            cd install/docker/ubi9
            sed -i -e "s/24-jdk-ubi9-minimal/24-jre-ubi9-minimal/g" Dockerfile
            sed -i -e "s/EXPOSE 3333/#EXPOSE 3333/g" Dockerfile
            mvn -DdockerTag=latest-ubi9 package
            docker import target/docker/jpsonic/jpsonic/tmp/docker-build.tar
            docker buildx build --push --platform linux/amd64 -t jpsonic/jpsonic:latest-ubi9 .
          fi
      - name: Release with Alpha/Beta Tag
        if: github.ref == 'refs/heads/main'
        run: |
          if [[ ${{ env.DOCKER_TAG }} =~ ^[0-9]+\.[0-9]+\.[0-9]+\.(alpha|beta)\.[0-9]+\.[0-9]+$ ]]; then
            cd install/docker/ubi9
            sed -i -e "s/24-jdk-ubi9-minimal/24-jre-ubi9-minimal/g" Dockerfile
            sed -i -e "s/EXPOSE 3333/#EXPOSE 3333/g" Dockerfile
            mvn -DdockerTag=latest-ubi9 package
            docker import target/docker/jpsonic/jpsonic/tmp/docker-build.tar
            docker buildx build --push --platform linux/amd64 -t jpsonic/jpsonic:${{ env.DOCKER_TAG }}-ubi9 .
          fi
      - name: Release with Early-Access Tag
        if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/feature/docker'
        run: |
          cd install/docker/ubi9
          mvn -DdockerTag=ea-ubi9 package
          docker import target/docker/jpsonic/jpsonic/tmp/docker-build.tar
          docker buildx build --push --platform linux/amd64 -t jpsonic/jpsonic:ea-ubi9 .
  ##########################################################################
  ship-docker-image-noble:
    name: Docker(noble-amd,arm)
    needs: ship-war
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
