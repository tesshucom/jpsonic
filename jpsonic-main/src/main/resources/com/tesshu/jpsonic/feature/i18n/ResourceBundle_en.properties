helppopup.albumactions.text                           = When turned on, a check box is displayed for each song in the album and the specified song can be added to the existing playlist. Available features vary depending on the permissions your account is granted.
helppopup.albumactions.title                          = Operation function for each song
helppopup.albumlist.text                              = You can select what to display when you click the home button. 
helppopup.albumlist.title                             = Default display of Home
helppopup.alternativedrawer.text                      = When on, when you open either the drawer or the play queue, the other closes. On for tablets is recommended.
helppopup.alternativedrawer.title                     = Do not open drawer and play queue at the same time
helppopup.anonymoustranscoding.text                   = If off, the transcoding settings for all anonymous users will be disabled and shared with the guest users. When turned on, it can be set for each anonymous user as in the legacy server, but it is not recommended. Depending on the UPnP/DLNA client, problems may occur due to differences in the MIME types when viewing and playing resource URIs.
helppopup.anonymoustranscoding.title                  = Anonymous user transcoding
helppopup.autocontrol.text                            = With this option selected, {0} will automatically start the player when you click "Play" in the playlist. Otherwise, you must start and connect the player yourself.
helppopup.autocontrol.title                           = Control player automatically
helppopup.captcha.text                                = When enabled, users must solve a CAPTCHA to prove they are human when requesting a password reset.</p> <p>Requires registration with an external service; see the <a href="https://airsonic.github.io/docs/captcha/">documentation</a>.
helppopup.captcha.title                               = CAPTCHA
helppopup.chromecast.text                             = Many UPnP apps such as BubbleUPnP and Hi-fi-Cast are equipped with features for linking with Chromecast. We recommend using these.
helppopup.closedrawer.text                            = When on, the drawer is closed when screen transition. On for tablets is recommended.
helppopup.closedrawer.title                           = Initial display of drawer
helppopup.closeplayqueue.text                         = When on, the play queue is closed when screen transition. On for tablets is recommended.
helppopup.closeplayqueue.title                        = Automatically close the play queue
helppopup.coverartlimit.text                          = The maximum number of cover art images to display on a single page.
helppopup.coverartlimit.title                         = Cover art limit
helppopup.coverartmask.text                           = Allows you to specify the type of files that should be recognized as cover art when browsing through the media folder.
helppopup.coverartmask.title                          = Cover art files
helppopup.coverarttoexclude.text                      = Specify space-separated filenames that you don't want to use in your cover art. There are often apps that output images to a directory (like a hidden file called AlbumArtSmall.jpg that WMP creates). If you prefer ID3 embedded images over files generated by external apps, specify files to exclude here.
helppopup.databaseConfigType.text                     = For HOST, the default embedded DB is used. URL connects to the database with the specified settings. JNDI looks for the DataSource configuration already set in the container.
helppopup.databaseConfigType.title                    = Data Source Config Type
helppopup.defaultactive.text                          = When this option is turned ON, it will be registered in the state where it is enabled against the existing player. It will be also enabled by default when creating a new player. The initial four transcodes that are pre-registered have this option turned on.
helppopup.defaultactive.title                         = Enabled by default
helppopup.deletediacritic.text                        = Normalize signed characters such as \u00C1\u00C5\u00C3 treat them as A. Does not support strokes such as \u0243
helppopup.dlnaenable.text                             = Use this option to turn on the UPnP media server in Jpsonic, and stream your media to compatible UPnP/DLNA players. Requires restart.
helppopup.dlnaenable.title                            = Enable UPnP
helppopup.dlnafolder.text                             = If there are multiple music folders, it will be displayed from the music folder hierarchy.
helppopup.dlnafolder.title                            = Folder
helppopup.dlnagenrecountvisible.text                  = You can view the number of genres if all folders are allowed to access.
helppopup.dlnagenrecountvisible.title                 = Genre count
helppopup.dlnalanurl.text                             = The base LAN address to be used for UPnP resources, for example http://192.168.1.2:8080/jpsonic/
helppopup.dlnalanurl.title                            = LAN server address
helppopup.dlnaplaylist.text                           = By default, all playlists are displayed. If the "Guest" user folder control is on, only playlists that are set to public will be displayed.
helppopup.dlnaplaylist.title                          = Playlist
helppopup.dlnaservername.text                         = Name of the media server, as shown on UPnP/DLNA players.
helppopup.dlnaservername.title                        = UPnP server name
helppopup.downloadlimit.text                          = An upper limit for how much bandwidth can be used for downloading files(0 = Unlimited).
helppopup.downloadlimit.title                         = Download limit
helppopup.downsamplecommand.text                      = Allows you to specify the command for downsampling to lower bitrates.</p><p>(%s = The file to be downsampled, %b = Max bitrate of the player, %t = Title, %a = Artist, %l = Album)
helppopup.downsamplecommand.title                     = Downsample command
helppopup.dynamicip.text                              = If the player uses a static IP address this should be turned off.
helppopup.dynamicip.title                             = Dynamic IP address
helppopup.embeddriver.text                            = JDBC Driver dependent class name that implments java.sql.Driver. I.e. for PostgreSQL one would use org.postgresql.Driver. This class must be present in the classpath.
helppopup.embeddriver.title                           = JDBC Driver Class
helppopup.excludepattern.text                         = Jpsonic will not import any files matching this regular expression pattern.
helppopup.excludepattern.title                        = Exclude Pattern
helppopup.expunge.text                                = Jpsonic stores information about all media files ever encountered. By cleaning up the database after scanning, information about files that are no longer in your media collection is permanently removed.
helppopup.expunge.title                               = Exclude data
helppopup.filemodifiedcheckscheme.last_modified.text  = Whether or not to parse a file is determined by comparing the modification dates of the file entities. Unlike Subsonic and Airsonic, Jpsonic parses children before parent directories. Therefore, the album information created based on the child file will have the same result on any OS. In addition, it does not depend on the update date of the directory that is highly dependent on the OS, and has been improved so that the album will be re-analyzed if the child file has been updated.
helppopup.filemodifiedcheckscheme.last_modified.title = Automatic check by last update date
helppopup.filemodifiedcheckscheme.last_scanned.text   = This is an interim workaround for platforms that cannot get the directory update date. Improved scan flow to respect child file dates over album dates. This feature will be removed in the next version.
helppopup.filemodifiedcheckscheme.text                = You can switch file check methods between automatic or manual for scanning. If you always want to manually manage what you scan, consider turning off automatic scanning for scheduled runs. Helps reduce the extra load on the machine.
helppopup.filemodifiedcheckscheme.title               = File change check method
helppopup.filteredIp.text                             = If the checkbox is checked, TCP connections to the specified IP address will not be made. This setting is intended to suppress attempts to retrieve device information from the default gateway (router). Typically, UPnP is not enabled on such devices. If suppression is not enabled, you may see periodic connection failure logs on devices like Jpsonic or routers.
helppopup.forcebio2eng.text                           = Biography is displayed in the language selected in <strong>Language and theme</strong>. It supports translations in major languages, but if it doesn't look right, turn this option on to force English display.
helppopup.forcebio2eng.title                          = Biography locale
helppopup.forceinternalvalueinsteadoftags.text        = If this check is turned on, you can search in Romanized Japanese even if the artist names is registered in Japanese.
helppopup.hlscommand.text                             = The command used to create video segments for Apple''s HTTP Live Streaming (HLS) protocol.
helppopup.hlscommand.title                            = HTTP Live Streaming command
helppopup.ignoreFileTimestampsforeachalbum.text       = If you enable this option, the album page will display a button to force the next scan.
helppopup.ignoreFileTimestampsforeachalbum.title      = Specify the album to be scanned
helppopup.ignoredarticles.text                        = Allows you to specify a list of articles (such as <strong>The</strong>) that will be ignored when creating the index.
helppopup.ignoredarticles.title                       = Articles to ignore
helppopup.ignorefiletimestamps.text                   = A hidden option that exists on legacy servers. If this option is turned on, all files will be forced to scan regardless of the modification date. Not recommended for normal use.
helppopup.ignorefiletimestamps.title                  = Ignore timestamps
helppopup.index.text                                  = Allows you to specify index (located on the left side of the screen) appearance. Files and directories directly in the root media folder can be easily accessed using this index. The specification is a space-separated list of index entries. Typically, each entry is simply a single character, but you may also specify multiple characters. For instance, the entry <strong>The</strong> will link to all files and folders starting with <strong>The</strong>. You may also create an entry using a group of index characters in parentheses. For instance, the entry <strong>A-E(ABCDE)</strong> will display as <strong>A-E</strong> and link to all files and folders starting with either A, B, C, D or E.  This may be useful for grouping less-frequently used characters (such and X, Y and Z), or for grouping accented characters (such as A, \u00C0 and \u00C1) Files and folders that are not covered by an index entry will be placed under the index entry <strong>#</strong>.
helppopup.index.title                                 = Index
helppopup.indexEnglishPrior.text                      = Even if the reading of the native language is given to the name of the alphabet, it will be treated as an alphabet in the index and sorting. Both name and reading are valid in the search (currently switching is not supported).
helppopup.indexEnglishPrior.title                     = Alphabetical index
helppopup.indexscheme.text                            = This is the currently set sort-tag analysis method. Affects indexing, sorting, and search capabilities. You can change the settings in Advanced settings <strong>DangerZone</strong>
helppopup.indexschemeoutline                          = If you change the settings in this section, a full scan is required for the changes to take effect. If you want to check the operation, it is recommended to check with the library with a small number of songs after backup.<br>Jpsonic keeps the sort tag internally and data merge is performed at the time of scanning. In the case of a person's name, the order of priority is update date, album artist, artist, and composer. This avoids missing searches due to dirty data and differences in sort results due to the DB used.<br>If the sort tag is unregistered and cannot be resolved by data merging, the parsed value will be assigned. In this section you can change the parsing method for sort tags.
helppopup.jndiname.text                               = A JNDI name to look up a data source of type javax.sql.DataSource. It is created in your application container (i.e. Tomcat).
helppopup.jndiname.title                              = Lookup Name for JNDI Data Source
helppopup.jndiresource.text                           = For Tomcat, copy this content to conf/context.xml. This setting is an assumed value for the version you are currently using and may change in the future.
helppopup.keyboardshortcutsenabled.text               = Turn on to enable keyboard shortcuts. Some shortcut keys have been changed to be different from other Sonic servers to prevent interference with the default browser operation. Shortcut help can be displayed with <strong> ? </strong>.
helppopup.keyboardshortcutsenabled.title              = Shortcuts
helppopup.language.text                               = Specify the language to use. If the default is selected in <strong>Personal Settings</strong>, the language specified here will be used.
helppopup.language.title                              = Language
helppopup.ldap.text                                   = Users can be authenticated by an external LDAP server (including Windows Active Directory). When LDAP-enabled users log on to {0}, the username and password are checked by the external server, not by {0} itself.
helppopup.ldap.title                                  = LDAP authentication
helppopup.ldapautoshadowing.text                      = With this option selected, LDAP users don&#39;t have to be manually created in {0} before logging in.</p> <p>Note! This means any user with a valid LDAP username and password can log onto {0}, which may not be what you want.
helppopup.ldapautoshadowing.title                     = Automatically create LDAP users in {0}
helppopup.ldapmanagerdn.text                          = If the LDAP server doesn&#39;t support anonymous binding, you must specify the DN (<strong>Distinguished Name</strong>) and password of the LDAP user to use when binding.
helppopup.ldapmanagerdn.title                         = LDAP manager DN
helppopup.ldapsearchfilter.text                       = The filter expression used for user searches. This is an LDAP search filter (as defined in <a href="https://www.ietf.org/rfc/rfc2254.txt" target="_blank">RFC 2254</a>). The pattern "'{0}'" is replaced by the username, for instance: <ul><li>(uid='{0}') - this would search for a username matching the UID attribute.</li> <li>(sAMAccountName='{0}') - typically used for authentication in Microsoft Active Directory.</li> </ul>
helppopup.ldapsearchfilter.title                      = LDAP search filter
helppopup.ldapurl.text                                = The URL of the LDAP server. The protocol must be either <strong>ldap://</strong> or <strong>ldaps://</strong> (for LDAP over SSL). See <a href="http://java.sun.com/products/jndi/tutorial/ldap/misc/url.html" target="_blank">here</a> for a detailed description.
helppopup.ldapurl.title                               = LDAP URL
helppopup.loginmessage.text                           = The message displayed on the login page.
helppopup.loginmessage.title                          = Login message
helppopup.m3ubom.text                                 = Apply a BOM mark in generated M3U playlists for Unicode compatibility.
helppopup.m3ubom.title                                = Apply BOM in M3U file
helppopup.measurememory.text                          = When turned ON, the memory usage status at that time is additionally recorded in the log for each process related to scanning.
helppopup.musicmask.text                              = Allows you to specify the type of files that should be recognized as music.
helppopup.musicmask.title                             = Music files
helppopup.mysqlvarcharmaxlength.text                  = MySQL has a maximum row length, and as such needs varchar columns to be bound. The value entered here will be the maximum column size.
helppopup.mysqlvarcharmaxlength.title                 = MySQL Varchar Max Length
helppopup.native_japanese.text                        = Select if you want to use Japanese for the sort tag of Japanese songs. If the sort tag is not registered for Japanese, the complementary process based on Japanese is performed. For Japanese-English index.
helppopup.numberaccesskey.text                        = The access key is a function to jump to the link without using the mouse (Win[Alt+key], Mac[Control+Alt+key] are common, depending on the browser). If on, assigns a number as an access key to the 5*n index. When off, the index character is used as an access key, but it will be conflict with other features of the browser. And may be not useful for non-English.
helppopup.numberaccesskey.title                       = Access key assignment rule
helppopup.outputsearchquery.text                      = Log the input query. Normally, it is not necessary to turn it on when using it on the Web screen. This is used to check the operation of API input that does not involve key input, such as voice input.
helppopup.outputsearchquery.title                     = Input query log output
helppopup.paginationsize.text                         = Specify the initial display number of "Album of the same artist" displayed on the album page. With 0, page breaks are invalidated and all are displayed.
helppopup.paginationsize.title                        = Pagination size
helppopup.partymode.text                              = When on, the control button display is suppressed. It becomes difficult to operate the play queue by mistake.
helppopup.partymode.title                             = Party mode
helppopup.personalsettings.font.custom.text           = It is possible to use the fonts installed on the client. When using multiple fonts in combination, specify them in order of priority, separated by commas.
helppopup.personalsettings.font.custom.title          = Local font
helppopup.personalsettings.font.default.text          = Fonts setting that can render Japanese and English etc in many common operating systems.
helppopup.personalsettings.font.default.title         = Default font
helppopup.personalsettings.font.jp_embed.text         = Jpsonic has built-in Japanese fonts and supports more character types than other Sonic servers. The built-in Japanese font is mainly used to generate an alternative image in the absence of cover art. When this option is turned ON, the built-in Japanese font is also used for the web page font. Japanese can be displayed even on clients that do not have Japanese fonts.
helppopup.personalsettings.font.jp_embed.title        = Embedded Japanese font
helppopup.personalsettings.fontsize.text              = When explicitly specifying the font It is possible to specify the font size. For adjustments such as wanting to display characters a little larger, you may get better results by using the zoom of the browser than specified here. It is mainly used for fine-tuning when trying new fonts with significantly different font metrics values.
helppopup.personalsettings.fontsize.title             = Font size
helppopup.playername.text                             = Allows you to specify an easy-to-remember name for a player, such as "Work" or "Living room".
helppopup.playername.title                            = Player name
helppopup.playlistfolder.text                         = Playlists in this folder will be imported reqularly.
helppopup.playlistfolder.title                        = Import playlist from
helppopup.preferredformat.text                        = Specifies the transcoding "Convert to" format that should be preferred among the registered transcoding settings.
helppopup.preferredformat.title                       = Preferred format
helppopup.preferredformatannoymous.text               = Applies the specified format to UPnP/Share streaming. If the player is assigned a valid transcoding, the received format will be unified.
helppopup.preferredformatannoymous.title              = annoymous
helppopup.preferredformatother_than_request.text      = Applies the specified format to all streaming except the Subsonic API, including the browser. If the player is assigned a valid transcoding, the received format will be unified.
helppopup.preferredformatother_than_request.title     = Other than Rest
helppopup.preferredformatrequest_only.text            = It behaves like a legacy server. Except for Subsonic apps, whether transcoding is performed depends on the bit rate.
helppopup.preferredformatrequest_only.title           = Not specified
helppopup.preferredformatscheme.text                  = Specifies the range to which the format applies. The settings here do not affect the streaming of the Subsonic app.
helppopup.preferredformatscheme.title                 = Scope of application
helppopup.prohibitsortvarious.text                    = Under directories such as Various Artists and Various Classical Artists, sort by dictionary rather than year. This is useful when multiple compilation albums are mixed.
helppopup.prohibitsortvarious.title                   = Exclude year sort
helppopup.recaptchaSecretKey.text                     = A secret key obtained from the reCAPTCHA admin console. Left unchanged if blank.
helppopup.recaptchaSecretKey.title                    = reCAPTCHA secret key
helppopup.recaptchaSiteKey.text                       = A site key obtained from the reCAPTCHA admin console.
helppopup.recaptchaSiteKey.title                      = reCAPTCHA site key
helppopup.restoreaddtag.text                          = Add command options to add tags to the destination file. This is useful if you want to use your app's cache for secondary use by another app.
helppopup.restoreaddtag.title                         = Add tag
helppopup.romanized_japanese.text                     = Select if you want to use the alphabet for the sort tag of Japanese songs. For Japanese songs, if the sort tag is registered in Japanese or not registered anything, the complementary process based on romanized Japanese is performed. Languages that conflict with the Japanese character set will be able to coexist, if the sort tags are managed in the alphabet.
helppopup.scanMediaFolders.text                       = Note that subfolder names starting with a dot (.) or @eaDir, as well as Thumbs.db files, are ignored.
helppopup.scanMediaFolders.title                      = Media folders scanning rules
helppopup.scanlog_after_scan.text                     = Post-processing of scans
helppopup.scanlog_before_scan.text                    = Scan preprocessing
helppopup.scanlog_canceled.text                       = Scan interrupted with Cancel
helppopup.scanlog_checkpoint.text                     = Run Checkpoint
helppopup.scanlog_clean_up_file_structure.text        = In case of default settings, unnecessary records are physically deleted. Correspondence between existing file entries and DB records is completed by this step
helppopup.scanlog_destroyed.text                      = Scanning was interrupted due to shutdown, etc.
helppopup.scanlog_failed.text                         = Something went wrong during the scanning process
helppopup.scanlog_folder_update.text                  = Folder updated
helppopup.scanlog_import_playlists.text               = Import playlist
helppopup.scanlog_music_folder_check.text             = Musicfolder existence check. Disabled if not present
helppopup.scanlog_parse_album.text                    = If there are newly parsed music files in the directory, create File Structure album information based on the information of the first fetched child file
helppopup.scanlog_parse_file_structure.text           = Checks all files and directories, parsing music files if necessary
helppopup.scanlog_parse_podcast.text                  = Parsing a podcast directory
helppopup.scanlog_parse_video.text                    = The video is parsed. It is not analyzed at the same time as the analysis of music files because the characteristics are different
helppopup.scanlog_refresh_album_id3.text              = Differential update of the ID3 album table is performed based on the analyzed File Structure data
helppopup.scanlog_refresh_artist_id3.text             = Differential update of the ID3 artist table is performed based on the analyzed File Structure data
helppopup.scanlog_run_stats.text                      = Update statistics per directory
helppopup.scanlog_scanned_count.text                  = Count number of files excluding directories and videos checked by PARSE_FILE_STRUCTURE
helppopup.scanlog_success.text                        = Completed the entire scanning process
helppopup.scanlog_unknown.text                        = Scan aborted for unknown reason
helppopup.scanlog_update_album_counts.text            = Update number of albums per ID3 artist
helppopup.scanlog_update_genre_master.text            = Genre master update. The genre table on the database is the same as the old data specification. Multi-genre is managed on Lucene
helppopup.scanlog_update_order_of_album.text          = Update sort key for all albums
helppopup.scanlog_update_order_of_album_id3.text      = Update ID3 album sort key
helppopup.scanlog_update_order_of_artist.text         = Update sort key for all album artists
helppopup.scanlog_update_order_of_artist_id3.text     = Update ID3 artist sort key
helppopup.scanlog_update_order_of_song.text           = Updated the sort key for music files that exist directly under the music folder. Analysis of File Structure is completed up to this step
helppopup.scanlog_update_sort_of_album.text           = Merge, copy, or supplement album name sorting tags. Due to the cumulative update, the processing is drastically reduced after the first scan. or for complete libraries no processing occurs at this step
helppopup.scanlog_update_sort_of_artist.text          = Merge, copy, or supplement sort tags for artists, album artists, and composers. Due to the cumulative update, the processing is drastically reduced after the first scan. or for complete libraries no processing occurs at this step
helppopup.scanlogoutline                              = Scan-logs are managed on a database. You can also output detailed information depending on the settings. Minimal history management is done by default to conserve memory.
helppopup.scanlogretention.text                       = Specify how long to keep logs
helppopup.searchcomposer.text                         = If this check box is turned on, composers are included in the search target for all users regardless of their personal settings. Check this if you want to search for composers in UPnP.
helppopup.searchcomposer.title                        = Search for composers
helppopup.searchmethod.text                           = If off, use phrase searches with fast and less false positives. If on switches to the legacy method(Old-Subsonic/Airsonic method). You need to restart and scan the server for the settings to take effect.
helppopup.searchmethod.title                          = Search method switching
helppopup.searchmethodfile_structure.text             = It uses the same search method as a web page. If the tags on your music files aren't set up, it\u2019ll use the directory or file names instead. This method works really well for music libraries organized in three layers (Artist/Album/Song).
helppopup.searchmethodid3.text                        = Tags are used for the search. The tags on your music files need to be well organized.
helppopup.shortcuts.text                              = A space-separated list of top-level folders to create shortcuts to. Use quotes to group words, for instance:</p> <p><strong>New Incoming "Sound tracks"</strong>
helppopup.shortcuts.title                             = Shortcuts
helppopup.showdbdetails.text                          = This is a feature for developers. It will be shown on the About page.
helppopup.showindex.text                              = If off, no index is displayed in the drawer. An index with different operability also exists in Home and can be assigned to the initial display screen. If you use mainly the index of Home on tablets(keyboed, screen reader), you can speed up the initial display by hiding the drawer index.
helppopup.showindex.title                             = Drawer index display
helppopup.showindexdetails.text                       = This is a feature for developers. It will be shown on the About page.
helppopup.shownowplaying.text                         = In the notification area, you will be notified of scan status, now playing song, and new version. If these are not important to you, you can turn them off to give yourself more viewing other area. OFF is recommended for tablets. <strong> The notification area will be abolished in future layout changes and the display method will change </ strong>.
helppopup.shownowplaying.title                        = Notification area
helppopup.showrememberme.text                         = When on, on the login page, a cookie for authentication can be issued to your browser. It is hidden by default to reduce security.
helppopup.showrememberme.title                        = Remember Me authentication
helppopup.smtpCredentials.text                        = The credentials for connecting to the SMTP server. Leave empty to connect without authentication.
helppopup.smtpCredentials.title                       = SMTP Credentials
helppopup.smtpEncryption.text                         = Encryption method used for connections to the SMTP server. Choose "None" for no encryption.
helppopup.smtpEncryption.title                        = SMTP Encryption
helppopup.smtpFrom.text                               = The sender address for e-mails originating from the Jpsonic server. Must be a valid e-mail address.
helppopup.smtpFrom.title                              = From address
helppopup.smtpPort.text                               = Server port to connect to for outgoing e-mail traffic.
helppopup.smtpPort.title                              = SMTP Port
helppopup.smtpServer.text                             = The hostname of the SMTP server. This server will be used to send e-mails to users who have requested a password reset.
helppopup.smtpServer.title                            = SMTP Server
helppopup.sortalbumsbyyear.text                       = Sort directory of album (second level under music folder) by year. This setting affects all sort orders such as UPnP.
helppopup.sortalbumsbyyear.title                      = Year sort
helppopup.sortalphanum.text                           = If the name contains numbers such as 1, 10, 100, sort the numbers in order. If no such name exists, turn it off.
helppopup.sortalphanum.title                          = Serial number sort
helppopup.sortgenresbyalphabet.text                   = By default, genres are sorted by song or album count. When this option is ON, sorting is in alphabetical order.
helppopup.sortgenresbyalphabet.title                  = Sort genres
helppopup.sortstrict.text                             = If ON, pairs of sort tags and corresponding names are unified internally. If the sort tags are not aligned, the accuracy of sorting may decrease. Or missing results may occur in searches using the sort tags.
helppopup.streamport.text                             = This option is relevant only if you use {0} on a server with SSL (HTTPS).</p><p>Some players (such as Winamp) don&#39;t support streaming over SSL. Specify the port number for regular HTTP (usually 80 or 4040) if you don&#39;t want the streams to be transmitted over SSL. Note that the streams will not be encrypted.
helppopup.streamport.title                            = Non-SSL stream port
helppopup.theme.text                                  = Specify the theme. If the default is selected in <strong>Personal Settings</strong>, the theme specified here will be used.
helppopup.theme.title                                 = Theme
helppopup.title                                       = {0} Help
helppopup.transcode.text                              = If you have constrained bandwidth, you may set an upper limit for the bitrate of the music streams. For instance, if your original MP3 files are encoded using 256 Kbps (kilobits per second), setting max bitrate to 128 will make {0} automatically resample the music from 256 to 128 Kbps.
helppopup.transcode.title                             = Max bitrate
helppopup.uploadlimit.text                            = An upper limit for how much bandwidth can be used for uploading files(0 = Unlimited).
helppopup.uploadlimit.title                           = Upload limit
helppopup.upnpcontent.text                            = Please note that items marked with 'F' correspond to the File Structure of the Subsonic API. Even if the tag is not present, you will still be able to browse and locate all files without missing any.
helppopup.upnpgenre1.text                             = The sort order of genre names will be the same as that selected in By Album.
helppopup.upnpgenre1.title                            = Sorting folder/genre names
helppopup.upnpgenre2.text                             = The sort order of genre names will be the same as that selected in By Music.
helppopup.upnpgenre2.title                            = Sorting folder/genre names
helppopup.upnpgenresort.text                          = You can change the sort order of genre names. Song count (descending order of the number of songs in the genre), Name (English-Japanese dictionary order), and Album count (number of albums that contain songs in the genre).
helppopup.upnpsearchmethod.text                       = Similar to the Subsonic API, Jpsonic's UPnP search supports several methods. Keep in mind that depending on the UPnP app you use, there may not be much variation in behavior based on settings.
helppopup.upnpsubsonicgenre.text                      = This is a simulated view for backward compatibility. The accuracy of the Genre count may not be guaranteed.
helppopup.upnpsubsonicgenre.title                     = Subsonic Style Genres
helppopup.uriwithfileextensions.text                  = Some Windows applications (or their plug-ins) may rely entirely on file extensions to determine the codec type. This option allows you to use such applications.
helppopup.uriwithfileextensions.title                 = File extensions
helppopup.usejsonp.text                               = If ON, allows the use of Jsonp in the Subsonic API.
helppopup.usepartymode.text                           = You can enable a feature to prevent accidentally clearing the play queue in Personal Settings Page. It has existed since Subsonic, but is planned to be removed because it is very confusing, and complicated to implement.
helppopup.useradio.text                               = When off, Net TV/Radio will not be visible in Settings, Biography, or Drawers. In Japan, the provider usually provides a dedicated Web application service or native application, and the user rarely manages the URL. It is off by default because it causes confusion.
helppopup.useradio.title                              = Net TV/Radio
helppopup.usersettingsbuttonondrawer.text             = A button will appear in the drawer. User will need to log in again to update your credentials.
helppopup.usersettingsnowplayingallowed.text          = Sets whether or not to expose this user's playing state in the Subsonic API getNowPlaying. getNowPlaying is available to all users.
helppopup.usersettingspodcastenable.text              = Users will be able to enter URL at podcast pages. User will need to log in again to update your credentials.
helppopup.usersettingsrequireuserenable.text          = In addition, the user must enable it on "Personal > Additional display features" of settings page.
helppopup.usertablequote.text                         = The Jpsonic user table is named user. This may result in a keyword conflict with some database systems. Encasing it in double quotes (") works for PostgreSQL
helppopup.usertablequote.title                        = User Table Quote
helppopup.usescanevents.text                          = When turned ON, logs for each process related to scanning are additionally recorded. Some events, such as scans and shutdowns, are recorded regardless of this option.
helppopup.usescanlog.text                             = When ON, scan logs and library statistical information within the specified period are retained in the database. If OFF, only the latest one will be recorded.
helppopup.videomask.text                              = Allows you to specify the type of files that should be recognized as video.
helppopup.videomask.title                             = Video files
helppopup.visibility.text                             = Select which details should be displayed for each song.
helppopup.visibility.title                            = Visibility
helppopup.voiceinputenabled.text                      = The search button on the web page is changed to the microphone input start button. It can be used with Chrome on desktop PCs and Chrome / Edge on smart devices. SSH communication is required to use this feature.
helppopup.voiceinputenabled.title                     = Search by voice input
helppopup.welcomemessage.text                         = The message that is displayed on the home page.
helppopup.welcomemessage.title                        = Welcome message
helppopup.without_jp_lang_processing.text             = No Japanese-specific complementary processing is performed.

