transcodingsettings.preferredformatscheme              = Scope of preferred format
transcodingsettings.preferredoutline                   = The Subsonic API can request streaming by specifying the format. Most common Subsonic apps specify mp3, and some apps can switch this value.<br>On the other hand, streaming requests other than the Subsonic API do not specify the format. In this case, the transcoding execution decision becomes bitrate dependent and the user cannot control the received format. Especially when the bitrate is set to No Limit, it causes a problem that Subsonic's app behaves very differently than others.<br>Here you can specify the preferred format for streaming requests other than the Subsonic API. By default, UPnP apps will work with the same formatting rules as Subsonic apps.
