transcodingsettings.info                               = <p>Available Substitutions:</p><dl><dt>%s</dt><dd>The file name to be transcoded</dd><dt>%b</dt><dd>Max allowed bitrate of the user/player</dd><dt>%o</dt><dd>Time offset into the file (used for scrubbing/segmenting)</dd><dt>%d</dt><dd>Time duration to play (used for HLS/segmenting)</dd><dt>%w</dt><dd>Video image width</dd><dt>%h</dt><dd>Video image height</dd><dt>%t</dt><dd>Title</dd><dt>%a</dt><dd>Artist</dd><dt>%l</dt><dd>Album</dd></dl>Transcoding is the process of converting from one media format to another, or modifying the media properties. {1}''s transcoding engine allows streaming media that would not otherwise be playable by certain clients. Transcoding is performed on-the-fly and doesn&#39;t require any extra storage space, but does require that the server have sufficient processing resources to transcode the particular format faster than real-time.</p><p>The transcoding is performed using a third-party command line program, which must be installed in {0}. You may add your own custom transcoder given it fulfills the following requirements: <ul><li>Command line interface.</li><li>Ability to send output to stdout.</li><li>If used in step 2, it must have the ability to read input from stdin.</li></ul></p><p> Note that transcoding is activated on a per-player basis from <strong>Settings \u2192 Players</strong>, but may also be activated if the server administrator requires it.
