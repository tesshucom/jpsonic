musicfoldersettings.scanoutline                           = Unlike traditional Sonic servers, Jpsonic allows you to cancel scans. This feature to interrupt processing at as safe a point as possible provides premature stop and retry. <ul><li>It is not a feature to save the intermediate state of the scanning flow and restart from there.</li><li>It is not a feature to roll back the analysis. Files that have already been analyzed will be skipped in the next scan.</li></ul>It is a feature that assumes cases such as emergency shutdown of NAS at the time of power failure. Almost the same process is performed when a shutdown is performed during a scan.
