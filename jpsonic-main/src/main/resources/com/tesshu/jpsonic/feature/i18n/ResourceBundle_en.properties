generalsettings.index                = Index
generalsettings.indexEnglishPrior    = If the name is alphabetic and the reading is JP, ignore the reading and index/sort as A-Z
generalsettings.indexoutline         = If you change the settings in this section, a full scan is required for the changes to take effect. If you want to check the operation, it is recommended to check with the library with a small number of songs after backup. Like Subsonic, the index is customizable. Two presets are provided as the Japanese-English index.<dl><dt>Japanese 50-syllabary (full index)</dt><dd>If you want a karaoke-like classification, select this. This is a traditional classification method that Japanese people have used for 1000 years. By the way, Kimetsu no Yaiba is a story 100 years ago. My Neighbor Totoro is about 60 years ago!</dd><dt>Consonant (simple index)</dt><dd>Select this if you want a compact index. This is also a very typical classification method, reducing the index size to 1/5.</dd></dl>
generalsettings.indexsettings        = Index settings
generalsettings.infrequent           = Suppressed legacy features
generalsettings.infrequentoutline    = Here you can activate the suppressed legacy features. One of the reasons Jpsonic turns these features off by default is:<ul><li>It is a feature that has low implementation quality and is difficult to put into practical use.</li><li>For security reasons, it is a feature that the administrator should decide whether to enable it.</li><li>It is a feature that depends on specific vendor specifications and is not widespread in the Japanese trade area.</li><li>An outdated feature that has been superseded by other useful features in the Japanese trade area.</li><li>This is a feature that Jpsonic has already provided upward compatibility feature.</li></ul>In other words, features that are unfamiliar to beginners and young generation users are actively hidden. The features listed here may not be actively maintained. <p><a href="https://tesshu.com/spec/omit-or-suppressed-features" target="_blank">See also</a>
generalsettings.language             = Default language
generalsettings.loginmessage         = Login message
generalsettings.musicmask            = Music files
generalsettings.outputsearchquery    = Output the input query to the log
generalsettings.playlistfolder       = Import playlists from
generalsettings.prohibitsortvarious  = Do not sort albums of artists starting with "various" by year
generalsettings.searchcomposer       = Include composers in search
generalsettings.searchmethod         = Search method switching
generalsettings.searchmethodlegacy   = Switch search method to legacy method
generalsettings.searchoutline        = Here you can make settings related to search. Whether or not to include the composer in the search target is linked to the composer display at <strong>personal settings</strong> page. However, personal settings cannot be applied to UPnP communication, so if you need UPnP search for the composer, set the option here.<br>Search log output is normally turned off to avoid unnecessary loads. The Japanese voice analysis engine makes it difficult to convert foreign words into text, so use it when you want to visually check how your pronunciation is converted into text.
generalsettings.searchsettings       = Search settings
generalsettings.shortcuts            = Shortcuts
generalsettings.showdbdetails        = Use Information about database tables
generalsettings.showgettingstarted   = Show Getting started on startup
generalsettings.showindexdetails     = Use Search Index Details
generalsettings.showrememberme       = Use Remember Me authentication
generalsettings.simpleindex          = Set English and simple Japanese index
generalsettings.sortalbumsbyyear     = Sort albums by year
generalsettings.sortalphanum         = Sort considering serial number
generalsettings.sortgenresbyalphabet = Sort genres alphabetically
generalsettings.sortoutline          = Here you can make settings related to sorting. Unlike the legacy server sorting has been improved, and the sorting result does not differ depending on the dependent DB or OS. If the data is incomplete, it will be merged or complementation. <ul><li>For person's names, if there are multiple different readings (sort tags) in the music data tags, they will be merged.</li><li>If reading (sort tag) is not set in the tag of Japanese music data, it will be complemented by the built-in Japanese analysis engine. The correct answer rate is over 90%.</li><li>If the reading is set for sort tag, no complementary processing will be performed.</li><li>If an incorrect reading (sort tag) is set for the tag of Japanese music data, it will be followed. Incorrect sorting may occur.</li></ul><p><a href="https://tesshu.com/spec/general-settings" target="_blank">See also</a>
