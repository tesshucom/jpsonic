transcodingsettings.restoreoutline                     = With "flac resampling", you can resample the bitrate depth of a high resolution resource to the equivalent of a CD. This is convenient when using an LDAC device via a smartphone and wanting to limit the upper limit of the amount of communication data to the equivalent of CD sound quality. The settings for UPnP are as follows.<ul><li>Click "flac resampling" to save.</li><li>Change "Preferred format" to flac or select "Not specified" (Either is fine because the transcoding target is only flac).</li><li>Disable "mp3 audio" and enable "flac resampling" on the UPnP settings page. And change max bitrate to 1411.</li><li>Refresh the view in the UPnP client app (restart the app if there is no refresh feature).</li></ul>
