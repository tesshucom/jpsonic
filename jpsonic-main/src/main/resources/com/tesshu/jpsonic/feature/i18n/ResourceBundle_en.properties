personalsettings.playinganddisplayoutline = Here you can make settings related to music performance and display.Items that have different optimum operations for each device are mainly summarized.<br>There are three typical presets for PC / Tablet / Smartphone.Please change the individual items to your favorite settings according to your environment.For example :<ul><li>Make the drawer close automatically. If you have a lot of classical songs, you can make it easier to display all the song titles when displaying them on your PC.</li><li>Enable keyboard shortcuts to connect and use a keyboard on your tablet.</li><li>Enable speech recognition because using a headset on your PC.</li></ul>Please note that the web display for smartphones is not aimed at comfortable media viewing.A dedicated native app is more comfortable.<br>The settings screen can be used on the latest smartphones with sufficient width, so settings can be made without a desktop PC.<br>Any language can be assigned to the speech recognition language. See Google Cloud language support.<p><a href="https://cloud.google.com/speech-to-text/docs/languages" target="_blank">Cloud Speech-to-Text Language support</a>
